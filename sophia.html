<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Sophia - Lobby</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/player.css">
    <link rel="stylesheet" href="style/chat.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .blinking-meet {
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body data-player="sophia" class="bg-indigo-950 text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col p-4 gap-6">
        
        <!-- Top Bar -->
        <header class="flex justify-between items-center bg-indigo-900/40 p-4 rounded-2xl border border-white/5">
            <div>
                <h1 id="player-name-display" class="text-xl font-black text-pink-400">Sophia</h1>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="player-status-text" class="text-xs text-gray-400 font-bold uppercase tracking-widest">Online</span>
                </div>
            </div>
            <a href="index.html" class="text-xs bg-indigo-800/50 px-3 py-2 rounded-full hover:bg-slate-700 transition-colors">Voltar ao Início</a>
        </header>

        <!-- Main Actions -->
        <section class="space-y-4">
            <button id="btnCreateRoom" class="w-full bg-pink-600 hover:bg-pink-700 p-6 rounded-3xl font-black text-xl shadow-xl shadow-pink-900/20 transition-all flex flex-col items-center gap-2 transform active:scale-95">
                <span class="text-3xl">🎮</span>
                CRIAR NOVA SALA DE JOGO
            </button>
            <div id="activeRoomsSection" class="bg-indigo-900/60 rounded-3xl border border-white/5 p-5 space-y-4">
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">Salas Ativas</h2>
                <div id="activeRoomsList" class="space-y-2">
                    <!-- List of active rooms -->
                    <p class="text-xs text-gray-500 italic py-4 text-center">Nenhuma sala ativa no momento.</p>
                </div>
            </div>
        </section>

        <!-- Meet Component (Active by Papai) -->
        <div id="meet-container" class="hidden">
            <a href="#" id="meet-link" target="_blank" class="w-full bg-green-600 hover:bg-green-700 p-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl blinking-meet border-2 border-green-400/50 transition-all">
                <span class="text-2xl">📹</span>
                ENTRAR NO GOOGLE MEET
            </a>
        </div>

        <!-- Chats -->
        <section class="flex-1 flex flex-col min-h-[400px]">
            <div class="flex bg-indigo-900/40 rounded-t-2xl border-t border-x border-white/5">
                <button class="chat-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 border-pink-500 text-pink-400 bg-pink-500/5" data-chat="group">Global</button>
                <button class="chat-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500" data-chat="family">Família</button>
                <button class="chat-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500" data-chat="private-papai-sophia">Papai</button>
            </div>
            <div class="flex-1 bg-indigo-950/40 border-x border-b border-white/5 rounded-b-2xl overflow-hidden flex flex-col">
                <div id="messages-list" class="flex-1 p-4 overflow-y-auto space-y-3">
                    <!-- Messages -->
                </div>
                <div class="p-3 bg-indigo-900/60 border-t border-white/5 flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 bg-indigo-900 border-none rounded-xl px-4 py-2 text-sm outline-none focus:ring-1 focus:ring-pink-500" placeholder="Escreva...">
                    <button id="send-msg" class="bg-pink-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-pink-900/20">➤</button>
                </div>
            </div>
        </section>

    </div>

    <!-- Scripts -->
    <script type="module" src="script/lobby.js"></script>
</body>
</html>
