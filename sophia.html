<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ec4899">
    <title>Sophia - Quem Sou Eu?</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/player.css">
    <link rel="stylesheet" href="style/chat.css">
</head>
<body data-player="sophia">
    <div class="app-container fade-in">
        <main class="player-main">
            <header class="player-header">
                <div>
                    <h2 id="player-name-display">Sophia</h2>
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span id="player-score-header">0 pts</span>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="invite-btn" class="status-badge" style="cursor: pointer;">🔗 Convidar</button>
                    <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem;">🏠 Início</a>
                </div>
            </header>

            <!-- Ações Rápidas -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="btn-new-game" class="btn" style="flex: 1; background: #ec4899; font-size: 0.75rem; padding: 12px; font-weight: 800; border-radius: 12px;">🎮 Criar Novo Jogo</button>
                <button id="btn-change-pass" class="btn" style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; padding: 12px; font-weight: 800; border-radius: 12px;">🔑 Trocar Minha Senha</button>
            </div>

            <!-- Objetivo / Sonho de Jogo -->
            <div id="objective-container" class="hidden" style="margin-bottom: 15px;">
                <div style="background: linear-gradient(45deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1)); border: 1px dashed #10b981; padding: 12px; border-radius: 12px; font-size: 0.8rem; text-align: center;">
                    <div style="font-weight: 800; color: #10b981; margin-bottom: 4px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;">✨ Sonho de Jogo (Objetivo)</div>
                    <div id="objective-text" style="color: white; line-height: 1.4;"></div>
                </div>
            </div>

            <!-- Área do Meet (Sincronizada) -->
            <div id="meet-container" class="meet-button-container hidden">
                <a href="#" id="meet-link" target="_blank" class="btn btn-meet">
                    <span>📹</span>
                    <span>Entrar na Reunião</span>
                </a>
            </div>

            <!-- Área da Carta -->
            <section class="card-area">
                <div class="card-container">
                    <div id="game-card" class="game-card card-blur">
                        <div class="card-bg-overlay" id="card-bg-overlay"></div>
                        <div class="card-content">
                            <span class="card-category" id="card-cat">ANIMAIS</span>
                            <h3 class="card-title" id="card-text">???</h3>
                            <span class="card-difficulty" id="card-diff">FÁCIL</span>
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="toggle-card" class="btn" style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                        Ver Carta
                    </button>
                    <button id="btn-open-guess" class="btn" style="flex: 1; background: linear-gradient(to right, #f59e0b, #d97706); color: white;">
                        🎯 Dar Palpite
                    </button>
                </div>
            </section>

            <!-- Cronômetro -->
            <section class="timer-area">
                <div class="timer-display">
                    <span id="timer-number">60</span>
                </div>
                <div class="turn-status-container">
                    <span class="turn-label">Vez do Jogador</span>
                    <div class="turn-status" id="turn-status">Aguardando início...</div>
                </div>
            </section>

            <!-- Cartas dos Outros -->
            <section class="table-section" style="margin-top: 10px;">
                <div class="turn-label" style="margin-bottom: 12px; display: block;">Na Testa dos Outros:</div>
                <div id="all-cards-display" style="display: flex; flex-wrap: wrap; gap: 8px;">
                    <!-- Dinamizado -->
                </div>
            </section>

            <!-- Chats -->
            <section class="chats-section">
                <div class="chat-tabs">
                    <button class="chat-tab active" data-chat="group">Grupo Família</button>
                    <button class="chat-tab" data-chat="public">Público</button>
                    <button class="chat-tab" data-chat="private">Papai Private</button>
                </div>

                <div class="chat-window">
                    <div id="messages-list" class="messages-list">
                        <!-- Mensagens aqui -->
                        <div class="empty-chat">
                            <span>💬</span>
                            <p>Sem mensagens ainda. Dê um oi!</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Escreva aqui...">
                        <button id="send-msg" class="btn-send">➤</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal de Palpite -->
    <div id="guess-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px;">
        <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
            <h3 style="margin-bottom: 20px;">Qual é o seu palpite?</h3>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;">O Papai receberá seu palpite e dirá se você acertou!</p>
            <input type="text" id="guess-input" class="chat-input" placeholder="Ex: Gato, Batman..." style="width: 100%; margin-bottom: 20px; padding: 15px;">
            <div style="display: flex; gap: 10px;">
                <button id="btn-cancel-guess" class="btn" style="flex: 1; opacity: 0.6; background: transparent;">Cancelar</button>
                <button id="btn-confirm-guess" class="btn" style="flex: 2; background: #f59e0b;">Enviar Palpite</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="script/player.js"></script>
</body>
</html>
