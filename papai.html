<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Papai - Painel de Controle</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/papai.css">
    <link rel="stylesheet" href="style/chat.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-player="papai" class="bg-gray-950 text-white min-h-screen">
    
    <!-- Login Overlay (Admin Only) -->
    <div id="login-overlay" class="fixed inset-0 bg-gray-950/98 z-[2000] flex flex-col items-center justify-center p-6 text-center">
        <span class="text-6xl mb-4">🛡️</span>
        <h1 class="text-2xl font-black mb-2">Acesso Restrito ao Papai</h1>
        <p class="text-gray-400 mb-8 max-w-xs">Somente o administrador pode gerenciar os jogos e configurações da família.</p>
        <button id="btn-google-login" class="bg-white text-gray-950 px-8 py-4 rounded-2xl font-black flex items-center gap-3 hover:scale-105 active:scale-95 transition-all">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
            Entrar com Google
        </button>
    </div>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto p-4 lg:p-8 space-y-8 pb-32">
        <header class="flex justify-between items-center bg-gray-900/50 p-6 rounded-3xl border border-white/5">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black text-yellow-500 uppercase tracking-tighter">Painel do Papai</h1>
                <div id="online-indicators" class="flex gap-2 flex-wrap mt-2">
                    <div class="flex items-center gap-1.5 bg-green-500/10 px-2 py-0.5 rounded-full border border-green-500/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                        <span class="text-[10px] text-green-500 font-bold uppercase tracking-wider">Você</span>
                    </div>
                </div>
            </div>
            <a href="index.html" class="bg-gray-800 px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-700 transition-colors">Sair</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Column: Controls -->
            <div class="space-y-8">
                
                <!-- Game Actions -->
                <section class="bg-gray-900/50 p-6 rounded-3xl border border-white/5 space-y-4">
                    <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Gerenciar Jogos</h2>
                    <button id="btnCreateRoom" class="w-full bg-yellow-600 hover:bg-yellow-700 p-5 rounded-2xl font-black text-lg transition-all shadow-xl shadow-yellow-900/20 flex items-center justify-center gap-3">
                        <span>🎮</span> CRIAR NOVA SALA DE JOGO
                    </button>
                    <div id="activeRoomsList" class="space-y-3 pt-4 border-t border-white/5">
                        <h3 class="text-[10px] font-black text-gray-600 uppercase">Salas em Andamento</h3>
                        <!-- Rooms -->
                    </div>
                </section>

                <!-- Meet Controls -->
                <section class="bg-gray-900/50 p-6 rounded-3xl border border-white/5 space-y-4">
                    <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Google Meet</h2>
                    <div class="space-y-3">
                        <input type="text" id="meet-link-input" placeholder="https://meet.google.com/..." class="w-full bg-gray-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-green-500 transition-all text-sm font-medium">
                        <div class="flex gap-2">
                            <button id="btn-save-meet" class="flex-1 bg-gray-800 hover:bg-gray-700 p-3 rounded-xl font-bold text-sm transition-all border border-white/5">SALVAR LINK</button>
                            <button id="btn-toggle-meet" class="flex-1 bg-green-600/20 text-green-400 hover:bg-green-600/30 p-3 rounded-xl font-black text-sm transition-all border border-green-600/30">ATIVAR MEET</button>
                        </div>
                    </div>
                </section>

                <!-- Family Management -->
                <section class="bg-gray-900/50 p-6 rounded-3xl border border-white/5 space-y-4">
                    <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Senhas e Perfil</h2>
                    <div class="space-y-4">
                        <!-- Miguel -->
                        <div class="bg-blue-600/5 p-4 rounded-2xl border border-blue-600/10 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-blue-400">MIGUEL</span>
                                <input type="text" id="emoji-miguel" placeholder="💡" class="w-10 bg-gray-950 border-none rounded text-center py-1">
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="pass-miguel-input" placeholder="Nova senha..." class="flex-1 bg-gray-950 border-none rounded-lg px-3 py-2 text-xs">
                                <button id="p-save-miguel" class="bg-blue-600 text-xs px-3 py-1 rounded font-black">OK</button>
                            </div>
                        </div>
                        <!-- Sophia -->
                        <div class="bg-pink-600/5 p-4 rounded-2xl border border-pink-600/10 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="font-black text-pink-400">SOPHIA</span>
                                <input type="text" id="emoji-sophia" placeholder="👸" class="w-10 bg-gray-950 border-none rounded text-center py-1">
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="pass-sophia-input" placeholder="Nova senha..." class="flex-1 bg-gray-950 border-none rounded-lg px-3 py-2 text-xs">
                                <button id="p-save-sophia" class="bg-pink-600 text-xs px-3 py-1 rounded font-black">OK</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Chat -->
            <div class="space-y-8 flex flex-col min-h-[600px]">
                <section class="flex-1 flex flex-col bg-gray-900/50 rounded-3xl border border-white/5 overflow-hidden">
                    <div class="flex bg-gray-950/50">
                        <button class="chat-tab flex-1 py-4 text-[10px] font-black uppercase tracking-widest border-b-2 border-yellow-500 text-yellow-500 bg-yellow-500/5" data-chat="family">Família</button>
                        <button class="chat-tab flex-1 py-4 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500" data-chat="private-papai-miguel">Miguel</button>
                        <button class="chat-tab flex-1 py-4 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-gray-500" data-chat="private-papai-sophia">Sophia</button>
                    </div>
                    <div id="messages-list" class="flex-1 p-4 overflow-y-auto space-y-3">
                        <!-- Messages -->
                    </div>
                    <div class="p-4 bg-gray-950/50 border-t border-white/5 flex gap-2">
                        <input type="text" id="chat-input" class="flex-1 bg-gray-900 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-1 focus:ring-yellow-500" placeholder="Escreva uma mensagem...">
                        <button id="send-msg" class="bg-yellow-600 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg shadow-yellow-900/20 text-xl font-black">➤</button>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="script/papai.js"></script>
    <footer class="mt-20 py-8 border-t border-white/5 text-center">
        <button class="version-btn text-[10px] text-gray-600 font-bold uppercase tracking-widest hover:text-gray-400 transition-colors">Versão 1.2.2</button>
    </footer>
</body>
</html>
