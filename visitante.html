<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Convidado - Lobby</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/player.css">
    <link rel="stylesheet" href="style/chat.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-player="visitante" class="bg-gray-950 text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col p-4 gap-6">
        
        <!-- Top Bar -->
        <header class="flex justify-between items-center bg-gray-900/40 p-4 rounded-2xl border border-white/5">
            <div class="flex flex-col">
                <h1 id="guest-name-display" class="text-xl font-black text-gray-200">Visitante</h1>
                <div id="online-indicators" class="flex gap-2 flex-wrap mt-1">
                    <div class="flex items-center gap-1.5 bg-green-500/10 px-2 py-0.5 rounded-full border border-green-500/20">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-[10px] text-green-500 font-bold uppercase tracking-wider">Online</span>
                    </div>
                </div>
            </div>
            <a href="index.html" class="text-xs bg-gray-800 px-3 py-2 rounded-full hover:bg-gray-700 transition-colors">Sair</a>
        </header>

        <!-- Active Rooms Section (Primary for Visitors) -->
        <section class="space-y-4">
            <div class="bg-gray-900/60 rounded-3xl border border-white/5 p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">Salas Disponíveis</h2>
                    <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-0.5 rounded border border-blue-600/20 font-black">AO VIVO</span>
                </div>
                <div id="activeRoomsList" class="space-y-3">
                    <!-- List of active rooms -->
                    <div class="animate-pulse space-y-2">
                        <div class="h-16 bg-gray-800 rounded-2xl"></div>
                        <div class="h-16 bg-gray-800 rounded-2xl"></div>
                    </div>
                </div>
            </div>
            <p class="text-[10px] text-gray-600 text-center uppercase tracking-widest font-bold">Visitantes podem entrar em salas criadas pela família</p>
        </section>

        <!-- No chat in visitor lobby anymore -->

    </div>

    <!-- Scripts -->
    <script type="module" src="script/visitante.js"></script>
</body>
</html>
